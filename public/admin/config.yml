backend:
  name: git-gateway
  branch: main

media_folder: "src/assets"
public_folder: "../../assets"

site_url: "https://pauseai.ng"
display_url: "https://pauseai.ng"

collections:
  - name: "blog"
    label: "Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Tag", name: "tag", widget: "select", options: ["article", "event-recap", "policy", "video"], default: "article" }
      - { label: "Publish Date", name: "pubDate", widget: "datetime" }
      - { label: "Updated Date", name: "updatedDate", widget: "datetime", required: false }
      - { label: "Author", name: "author", widget: "string", default: "PauseAI Nigeria" }
      - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "events"
    label: "Events"
    folder: "src/content/events"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "City", name: "city", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "RSVP URL", name: "rsvpUrl", widget: "string", required: false }
      - { label: "Status", name: "status", widget: "select", options: ["upcoming", "past"] }
      - { label: "Recap Body", name: "recapBody", widget: "text", required: false }
      - label: "Photos"
        name: "photos"
        widget: "list"
        required: false
        field: { label: "Photo", name: "photo", widget: "image" }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  - name: "policy-tracker"
    label: "Policy Tracker"
    folder: "src/content/policy-tracker"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Institution", name: "institution", widget: "string" }
      - { label: "Status", name: "status", widget: "select", options: ["Active engagement", "No public stance", "Under review", "Consulted PauseAI"] }
      - { label: "Current Stance", name: "stance", widget: "text" }
      - { label: "Latest Action", name: "latestAction", widget: "text" }
      - { label: "Our Ask", name: "ask", widget: "text" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Source URL", name: "sourceUrl", widget: "string" }
      - { label: "Event Date", name: "eventDate", widget: "datetime" }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  - name: "team"
    label: "Team"
    folder: "src/content/team"
    create: true
    identifier_field: "name"
    slug: "{{name}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Role", name: "role", widget: "string" }
      - { label: "Bio", name: "bio", widget: "text" }
      - { label: "Order", name: "order", widget: "number", default: 0 }
      - { label: "Photo", name: "photo", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }
